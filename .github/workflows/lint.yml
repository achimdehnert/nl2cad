name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install workspace dependencies
        run: uv sync --all-packages --frozen

      - name: ruff check
        run: uv run ruff check packages/

      - name: ruff format check
        run: uv run ruff format --check packages/

      - name: mypy
        run: |
          for pkg in nl2cad-core nl2cad-areas nl2cad-brandschutz nl2cad-gaeb nl2cad-nlp; do
            echo "--- mypy: $pkg ---"
            uv run mypy packages/$pkg/src --ignore-missing-imports
          done
