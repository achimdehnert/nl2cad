name: Publish to PyPI / TestPyPI

on:
  push:
    tags:
      - "nl2cad-core@*"
      - "nl2cad-areas@*"
      - "nl2cad-brandschutz@*"
      - "nl2cad-gaeb@*"
      - "nl2cad-nlp@*"

jobs:
  publish:
    name: Build and publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Determine package from tag
        id: pkg
        run: |
          TAG="${{ github.ref_name }}"
          PKG="${TAG%@*}"
          VERSION="${TAG#*@}"
          echo "name=$PKG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "path=packages/$PKG" >> "$GITHUB_OUTPUT"

      - name: Verify version matches pyproject.toml
        run: |
          TOML_VER=$(grep '^version' packages/${{ steps.pkg.outputs.name }}/pyproject.toml \
            | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          TAG_VER="${{ steps.pkg.outputs.version }}"
          if [ "$TOML_VER" != "$TAG_VER" ]; then
            echo "ERROR: pyproject.toml version ($TOML_VER) != tag version ($TAG_VER)"
            exit 1
          fi

      - name: Build package
        run: |
          uv build --package ${{ steps.pkg.outputs.name }}

      - name: Publish to TestPyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.TEST_PYPI_TOKEN }}
        run: |
          uv publish --publish-url https://test.pypi.org/legacy/ dist/*

      - name: Publish to PyPI
        if: ${{ !contains(steps.pkg.outputs.version, 'a') && !contains(steps.pkg.outputs.version, 'b') && !contains(steps.pkg.outputs.version, 'rc') }}
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          uv publish dist/*
