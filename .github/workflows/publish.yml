name: Publish to PyPI

on:
  push:
    tags:
      - "nl2cad-*@*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Determine package from tag
        id: pkg
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Tag format: nl2cad-core@0.1.0 or nl2cad-areas@0.2.0
          PACKAGE="${TAG%@*}"
          VERSION="${TAG#*@}"
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing: $PACKAGE v$VERSION"

      - name: Install workspace
        run: uv sync --all-packages --frozen

      - name: Build package
        run: uv build --package ${{ steps.pkg.outputs.package }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
