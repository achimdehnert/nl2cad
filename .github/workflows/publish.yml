name: Publish to PyPI

on:
  push:
    tags:
      - "nl2cad-*@*"
      - "iil-nl2cadfw@*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Determine package and version from tag
        id: pkg
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Tag format: nl2cad-core@0.2.0 or iil-nl2cadfw@0.1.3
          PACKAGE="${TAG%@*}"
          VERSION="${TAG#*@}"
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing: $PACKAGE v$VERSION"

      - name: Set version from tag in pyproject.toml
        run: |
          PACKAGE="${{ steps.pkg.outputs.package }}"
          VERSION="${{ steps.pkg.outputs.version }}"
          # Root package (iil-nl2cadfw) lives in repo root, sub-packages in packages/<name>
          if [ "$PACKAGE" = "iil-nl2cadfw" ]; then
            uv version "$VERSION"
          else
            uv version --package "$PACKAGE" "$VERSION"
          fi
          echo "Set $PACKAGE version to $VERSION"

      - name: Install workspace dependencies
        run: uv sync --all-packages

      - name: Build package
        run: uv build --package ${{ steps.pkg.outputs.package }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
