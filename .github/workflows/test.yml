name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - nl2cad-core
          - nl2cad-areas
          - nl2cad-brandschutz
          - nl2cad-gaeb
          - nl2cad-nlp

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install workspace dependencies
        run: uv sync --all-packages --frozen

      - name: Run tests for ${{ matrix.package }}
        run: uv run pytest packages/${{ matrix.package }}/ -v --tb=short --cov=packages/${{ matrix.package }}/src
