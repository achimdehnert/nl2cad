name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-root:
    name: Root package (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install root package + dev deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest tests/ -v --tb=short

  test-subpackages:
    name: Sub-packages (Python 3.11)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [nl2cad-core, nl2cad-areas, nl2cad-gaeb, nl2cad-nlp]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ${{ matrix.package }} + dev deps
        working-directory: packages/${{ matrix.package }}
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        working-directory: packages/${{ matrix.package }}
        run: pytest tests/ -v --tb=short
