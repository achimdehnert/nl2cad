name: Tests

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - nl2cad-core
          - nl2cad-areas
          - nl2cad-brandschutz
          - nl2cad-gaeb
          - nl2cad-nlp
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install workspace
        run: uv sync --locked --all-extras

      - name: Run tests (${{ matrix.package }})
        run: uv run pytest packages/${{ matrix.package }}/ -v --tb=short --cov=packages/${{ matrix.package }}/src --cov-report=term-missing
