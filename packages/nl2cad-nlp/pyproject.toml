[project]
name = "nl2cad-nlp"
version = "0.1.0"
description = "Natural language to CAD intent classification and NL2DXF generator"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Achim Dehnert", email = "achim@dehnert.com" }]
keywords = ["nlp", "nl2cad", "intent", "cad", "ai", "llm"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "nl2cad-core>=0.1.0",
    "httpx>=0.27",
]

[tool.uv.sources]
nl2cad-core = { workspace = true }

[project.optional-dependencies]
openai   = ["openai>=1.0"]
anthropic = ["anthropic>=0.40"]
all = ["openai>=1.0", "anthropic>=0.40"]
dev = ["pytest>=8.0", "pytest-cov>=5.0", "pytest-asyncio>=0.23", "ruff>=0.4", "mypy>=1.10"]

[project.urls]
Homepage = "https://github.com/achimdehnert/nl2cad"
Repository = "https://github.com/achimdehnert/nl2cad"
Issues = "https://github.com/achimdehnert/nl2cad/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nl2cad"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"
