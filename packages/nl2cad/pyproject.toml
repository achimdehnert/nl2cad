[project]
name = "nl2cad"
version = "0.2.0"
description = "NL2CAD — Natural Language to CAD. Redirect package for iil-nl2cadfw."
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "Achim Dehnert", email = "achim@dehnert.com"}
]
keywords = [
    "nl2cad", "ifc", "dxf", "bim", "cad", "din277", "brandschutz",
    "gaeb", "nlp", "building", "architecture", "ai",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "iil-nl2cadfw>=0.1.0",
]

[project.urls]
Homepage = "https://github.com/achimdehnert/nl2cad"
Repository = "https://github.com/achimdehnert/nl2cad"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nl2cad"]
