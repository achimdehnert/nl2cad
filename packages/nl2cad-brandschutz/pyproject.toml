[project]
name = "nl2cad-brandschutz"
version = "0.1.0"
description = "Fire safety analysis (Brandschutz) for nl2cad ecosystem — ASR A2.3, DIN 4102"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Achim Dehnert", email = "achim@dehnert.com" }]
keywords = ["brandschutz", "fire-safety", "asr-a23", "din4102", "bim", "ifc"]

dependencies = [
    "nl2cad-core>=0.1.0",
    "nl2cad-areas>=0.1.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.4"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nl2cad"]
