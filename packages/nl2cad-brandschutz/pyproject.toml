[project]
name = "nl2cad-brandschutz"
version = "0.1.0"
description = "Fire safety analysis (Brandschutz) for nl2cad ecosystem — ASR A2.3, DIN 4102"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Achim Dehnert", email = "achim@dehnert.com" }]
keywords = ["brandschutz", "fire-safety", "asr-a23", "din4102", "bim", "ifc"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "nl2cad-core>=0.1.0",
    "nl2cad-areas>=0.1.0",
]

[tool.uv.sources]
nl2cad-core  = { workspace = true }
nl2cad-areas = { workspace = true }

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.4"]

[project.urls]
Homepage = "https://github.com/achimdehnert/nl2cad"
Repository = "https://github.com/achimdehnert/nl2cad"
Issues = "https://github.com/achimdehnert/nl2cad/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nl2cad"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"
