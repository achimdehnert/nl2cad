[project]
name = "nl2cad-gaeb"
version = "0.1.0"
description = "GAEB X81–X85 generator and IFC-to-GAEB converter for nl2cad ecosystem"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Achim Dehnert", email = "achim@dehnert.com" }]
keywords = ["gaeb", "leistungsverzeichnis", "avb", "bim", "ifc", "construction"]

dependencies = [
    "nl2cad-core>=0.1.0",
    "openpyxl>=3.1",
]

[tool.uv.sources]
nl2cad-core = { workspace = true }

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.4"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nl2cad"]
