[project]
name = "nl2cad-areas"
version = "0.1.0"
description = "DIN 277 and WoFlV area calculators for nl2cad ecosystem"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Achim Dehnert", email = "achim@dehnert.com" }]
keywords = ["din277", "woflv", "bim", "flächenberechnung", "building"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
]

dependencies = ["nl2cad-core>=0.1.0"]

[tool.uv.sources]
nl2cad-core = { workspace = true }

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.4", "mypy>=1.10"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nl2cad"]
